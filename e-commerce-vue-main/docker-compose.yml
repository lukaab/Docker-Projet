services:
  mongo-auth:
    image: mongo:4.4
    container_name: mongo-auth
    networks:
      - ecom-network

  auth-service:
    build:
      context: ./services/auth-service
      target: dev
    container_name: auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo-auth:27017/authdb
      JWT_SECRET: token
    depends_on:
      - mongo-auth
    networks:
      - ecom-network
  mongo-product:
    image: mongo:4.4
    container_name: mongo-product
    networks:
      - ecom-network
  mongo-order:
    image: mongo:4.4
    container_name: mongo-order
    networks:
      - ecom-network
  
  product-service:
    build:
      context: ./services/product-service
      target: dev
    container_name: product-service
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo-product:27017/productdb
    depends_on:
      - mongo-product
    networks:
      - ecom-network
  
  order-service:
    build:
      context: ./services/order-service
      target: dev
    container_name: order-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongo-order:27017/orders
      JWT_SECRET: token
      VITE_PRODUCT_SERVICE_URL: http://product-service:3000
    depends_on:
      - mongo-order
    networks:
      - ecom-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    ports:
      - "8080:8080"
    environment:
      VITE_AUTH_SERVICE_URL: http://auth-service:3001
      VITE_PRODUCT_SERVICE_URL: http://product-service:3000
      VITE_ORDER_SERVICE_URL: http://order-service:3002
    depends_on:
      - order-service
      - product-service
      - auth-service
    networks:
      - ecom-network
networks:
  ecom-network: